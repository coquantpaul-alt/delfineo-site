name = "delfineo-auth"
main = "workers/auth-worker.js"
compatibility_date = "2024-12-01"

# Route the worker to BOTH the apex and the www subdomain. Without the
# www route, requests to www.delfineo.com/api/auth/* fall through to
# Cloudflare Pages, which returns 405 Method Not Allowed.
routes = [
  { pattern = "delfineo.com/api/auth/*",     zone_name = "delfineo.com" },
  { pattern = "www.delfineo.com/api/auth/*", zone_name = "delfineo.com" },
]

# D1 database binding
[[d1_databases]]
binding       = "DB"
database_name = "delfineo-auth"
database_id   = "022d5f1a-d420-499b-bfa5-198d8d79e6c8"

# ── Secrets (set with: npx wrangler secret put NAME) ───────────
# AUTH_SECRET          32+ random chars, used to sign session cookies
# RESEND_API_KEY       from https://resend.com/api-keys
# BUTTONDOWN_API_KEY   (optional) syncs new users to newsletter list
# AUTH_FROM_EMAIL      "Delfineo <auth@delfineo.com>"
# AUTH_SITE_URL        "https://delfineo.com" (no trailing slash)

# ── Optional: observability ────────────────────────────────────
[observability]
enabled = true
